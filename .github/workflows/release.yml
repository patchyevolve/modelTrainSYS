name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build source artifacts
        shell: bash
        run: |
          mkdir -p dist
          git archive --format=zip --output=dist/MLsys-${GITHUB_REF_NAME}.zip HEAD
          git archive --format=tar.gz --output=dist/MLsys-${GITHUB_REF_NAME}.tar.gz HEAD

      - name: Publish release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
          generate_release_notes: true
