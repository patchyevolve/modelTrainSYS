name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint (fast)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install lint tools
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff (error-focused)
        shell: bash
        run: |
          ruff check . --select=E9,F63,F7,F82

  test:
    name: "${{ matrix.os }} / py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install runtime deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install torch numpy pandas pillow

      - name: Syntax check
        shell: bash
        run: |
          python -m compileall -q core training data ui start.py test_models.py production_smoke.py

      - name: Architecture regression tests
        shell: bash
        run: |
          python test_models.py

      - name: Production smoke tests
        shell: bash
        run: |
          python production_smoke.py
